<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le Palais de Sowji</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="coffre" id="coffre">

<div class="couvercle">
👑
</div>

<h1>Le Palais de Sowji</h1>

<p>

Bienvenue dans un jardin secret.

<br><br>

Chaque fleur renferme un souvenir,
une pensée ou un morceau de mon cœur.

<br><br>

Lorsque tu seras prête,
ouvre le palais...

</p>

<button id="ouvrirBtn" onclick="ouvrirPalais()">

🔐 Ouvrir le Palais

</button>

</div>

<script>

function creerPetale(){

const petale=document.createElement("div");

petale.className="petale";

const fleurs=["🌸","🌺","🌹","✨"];

petale.innerHTML=fleurs[Math.floor(Math.random()*fleurs.length)];

petale.style.left=Math.random()*100+"vw";

petale.style.animationDuration=(4+Math.random()*5)+"s";

petale.style.fontSize=(18+Math.random()*20)+"px";

document.body.appendChild(petale);

setTimeout(function(){

petale.remove();

},9000);

}



function ouvrirPalais(){

const coffre=document.getElementById("coffre");

const bouton=document.getElementById("ouvrirBtn");

bouton.style.display="none";

coffre.classList.add("ouvert");

let pluie=setInterval(creerPetale,150);

setTimeout(function(){

clearInterval(pluie);

window.location.href="jardin.html";

},1800);

}

</script>

</body>

</html>
