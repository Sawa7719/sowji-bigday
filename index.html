<body>

<div class="coffre">

<div class="couvercle">

<h1>Le Palais de Sowji</h1>

<p>
Bienvenue dans un jardin secret où chaque fleur cache une pensée,
un souvenir et une émotion.
<br><br>
Chaque jour, une nouvelle fleur s'ouvrira jusqu'au plus beau des jours.
</p>

<button onclick="ouvrirPalais()">
🔐 Ouvrir le palais
</button>

</div>

<script>

function ouvrirPalais(){

const coffre = document.querySelector(".coffre");

coffre.classList.add("ouvert");

setTimeout(function(){

window.location.href = "jardin.html";

},1500);

}

</script>
