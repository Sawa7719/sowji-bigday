<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le parchemin</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="parchemin">

<h1 id="titreLettre">
📜 Une lettre pour toi
</h1>

<div class="sceau-royal">
👑
</div>

<div class="sceau-date">
<span id="dateLettre"></span>
</div>

<div class="contenu-lettre">

<p id="texteLettre">
La lettre voyage encore...
</p>

<img id="photo" alt="">

<audio id="musique" autoplay loop></audio>

</div>

<button onclick="retourJardin()">
🌿 Retour au jardin
</button>

</div>

<script src="lettres.js"></script>

<script>

// =====================
// RÉCUPÉRATION DE LA DATE
// =====================

const parametres = new URLSearchParams(window.location.search);

const cleDate = parametres.get("date");

// =====================
// ÉLÉMENTS HTML
// =====================

const titreLettre = document.getElementById("titreLettre");
const texteLettre = document.getElementById("texteLettre");
const dateLettre = document.getElementById("dateLettre");
const photo = document.getElementById("photo");
const musique = document.getElementById("musique");

// =====================
// AFFICHAGE DE LA DATE
// =====================

if(cleDate){

    const date = new Date(cleDate + "T12:00:00");

    dateLettre.innerHTML = date.toLocaleDateString(
        "fr-FR",
        {
            day:"numeric",
            month:"long",
            year:"numeric"
        }
    );

}

// =====================
// RECHERCHE DE LA LETTRE
// =====================

const lettre = lettres[cleDate];

if(lettre){
      titreLettre.innerHTML = "📜 " + lettre.titre;

    texteLettre.innerHTML = lettre.texte;

    if(lettre.photo){

        photo.src = lettre.photo;
        photo.style.display = "block";

    }else{

        photo.style.display = "none";

    }

    if(lettre.musique){

        musique.src = lettre.musique;
        musique.volume = 0.35;

        musique.play().catch(()=>{

            console.log("Lecture automatique bloquée.");

        });

    }else{

        musique.style.display = "none";

    }

}else{

    titreLettre.innerHTML = "📜 Lettre inconnue";

    texteLettre.innerHTML = "Cette lettre n'est pas encore arrivée.";

    photo.style.display = "none";
    musique.style.display = "none";

}

// =====================
// RETOUR AU JARDIN
// =====================

function retourJardin(){

    window.location.href = "jardin.html";

}

</script>

</body>

</html>
