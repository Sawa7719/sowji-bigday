<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Une lettre pour toi</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="parchemin">


<h1>
📜 Une lettre pour toi
</h1>



<p id="dateLettre"></p>



<div class="contenu-lettre">


<p id="texteLettre">

Cette lettre voyage encore...

</p>



<div class="media">


<img id="photo" src="" alt="">


<video id="video" controls></video>


<audio id="musique" controls></audio>


</div>



</div>



<button onclick="retourJardin()">

Retour au jardin

</button>


</div>



<!-- Le coffre des lettres -->

<script src="lettres.js"></script>



<script>


const param =

new URLSearchParams(

window.location.search

);



const date =

new Date(

param.get("date")

);



const dateAffichee =

date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long",

year:"numeric"

}

);



document.getElementById("dateLettre").innerHTML =

dateAffichee;



const dateCle =

date.toISOString().split("T")[0];



const lettreChoisie =

lettres[dateCle];




const texteLettre =

document.getElementById("texteLettre");



const photo =

document.getElementById("photo");



const video =

document.getElementById("video");



const musique =

document.getElementById("musique");





if(lettreChoisie){



texteLettre.innerHTML =

lettreChoisie.texte;



if(lettreChoisie.photo !== ""){

photo.src = lettreChoisie.photo;

}

else{

photo.style.display="none";

}




if(lettreChoisie.video !== ""){

video.src = lettreChoisie.video;

}

else{

video.style.display="none";

}




if(lettreChoisie.musique !== ""){

musique.src = lettreChoisie.musique;

}

else{

musique.style.display="none";

}



}

else{



texteLettre.innerHTML =

`

Cette lettre n'est pas encore arrivée...

<br><br>

Elle voyage encore jusqu'à son jour.

`;

}



function retourJardin(){


window.location.href =

"jardin.html";


}



</script>



</body>

</html>
