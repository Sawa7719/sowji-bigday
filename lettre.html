<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Une lettre pour toi</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="parchemin">


<h1>
📜 Une lettre pour toi
</h1>



<p id="dateLettre"></p>



<div class="contenu-lettre">


<p id="texteLettre">

La lettre voyage encore...

</p>



<div class="media">


<img id="photo" alt="">


<video id="video" controls></video>


<audio id="musique" controls></audio>


</div>


</div>



<button onclick="retourJardin()">

Retour au jardin

</button>



</div>



<!-- Coffre des lettres préparées -->

<script src="lettres.js"></script>



<script>


const parametres =

new URLSearchParams(

window.location.search

);



const date =

new Date(

parametres.get("date")

);



const cleDate =

date.toISOString().split("T")[0];



document.getElementById("dateLettre").innerHTML =

date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long",

year:"numeric"

}

);



const texteLettre =

document.getElementById("texteLettre");



const photo =

document.getElementById("photo");



const video =

document.getElementById("video");



const musique =

document.getElementById("musique");





/*
Recherche d'abord une lettre
écrite depuis l'atelier,
sinon utilise lettres.js
*/



let lettre = null;



let lettreSauvegardee =

localStorage.getItem(

"sowji-" + cleDate

);





if(lettreSauvegardee){


let sauvegarde =

JSON.parse(

lettreSauvegardee

);



lettre = {


texte:

sauvegarde.message,


photo:

sauvegarde.photo,


video:"",


musique:

sauvegarde.musique


};



}

else if(typeof lettres !== "undefined"){



lettre =

lettres[cleDate];


}







if(lettre){



texteLettre.innerHTML =

lettre.texte;



if(lettre.photo){


photo.src = lettre.photo;


}

else{


photo.style.display="none";


}





if(lettre.video){


video.src = lettre.video;


}

else{


video.style.display="none";


}





if(lettre.musique){


musique.src = lettre.musique;


}

else{


musique.style.display="none";


}



}

else{



texteLettre.innerHTML =

`

Cette lettre n'est pas encore arrivée...

<br><br>

Elle poursuit encore son voyage jusqu'à toi.

`;



}





function retourJardin(){


window.location.href =

"jardin.html";


}



</script>



</body>

</html>
