<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Une lettre pour toi</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="parchemin">


<h1>
📜 Une lettre pour toi
</h1>



<p id="dateLettre"></p>



<div class="contenu-lettre">


<p id="texteLettre">

La lettre arrive...

</p>


<div class="media">


<img id="photo" alt="">


<video id="video" controls></video>


<audio id="musique" controls></audio>


</div>


</div>



<button onclick="retourJardin()">

Retour au jardin

</button>



</div>



<script src="lettres.js"></script>


<script>


const parametres =

new URLSearchParams(

window.location.search

);



const date =

new Date(

parametres.get("date")

);



const cleDate =

date.toISOString().split("T")[0];



document.getElementById("dateLettre").innerHTML =

date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long",

year:"numeric"

}

);



const lettre =

lettres[cleDate];



const texte =

document.getElementById("texteLettre");



const photo =

document.getElementById("photo");



const video =

document.getElementById("video");



const musique =

document.getElementById("musique");





if(lettre){



texte.innerHTML =

lettre.texte;



if(lettre.photo){

photo.src = lettre.photo;

}

else{

photo.style.display="none";

}



if(lettre.video){

video.src = lettre.video;

}

else{

video.style.display="none";

}



if(lettre.musique){

musique.src = lettre.musique;

}

else{

musique.style.display="none";

}



}

else{


texte.innerHTML =

`

Cette lettre n'est pas encore arrivée...

<br><br>

Elle voyage encore jusqu'à son jour.

`;



}





function retourJardin(){


window.location.href =

"jardin.html";


}



</script>



</body>

</html>
