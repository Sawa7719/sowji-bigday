<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le Jardin de Sowji</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="jardin">


<h1>
✨Le Jardin de Sowji✨
</h1>


<p class="phrase">

Chaque fleur cache une surprise.

<br><br>

Chaque jour, le jardin révèle un nouveau souvenir.

<br><br>

<span id="compteur"></span>

</p>


<div class="chemin" id="chemin"></div>


</div>



<script src="lettres.js"></script>


<script>


const chemin =
document.getElementById("chemin");



const debut =
new Date("2026-07-21");



const fin =
new Date("2026-08-30");



const mariage =
new Date("2026-08-21");



const maintenant =
new Date();


maintenant.setHours(0,0,0,0);



mariage.setHours(0,0,0,0);

fin.setHours(0,0,0,0);





// COMPTE A REBOURS INTELLIGENT


let compteurTexte="";

let dateCible;



if(maintenant < mariage){


dateCible=mariage;


compteurTexte="Encore {jours} jours avant le grand jour 💍";


}

else if(maintenant < fin){


dateCible=fin;


compteurTexte="Encore {jours} jours de festivité 👑";


}

else{


compteurTexte="Maintenant a toi d'écrire ton FOREVER💋 ";


}





if(dateCible){


let jours=

Math.ceil(

(dateCible-maintenant)

/(1000*60*60*24)

);



compteurTexte=

compteurTexte.replace(

"{jours}",

jours

);


}



document.getElementById("compteur").innerHTML=

compteurTexte;









function afficherDate(date){


return date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long"

}

);


}







let dateActuelle =
new Date(debut);





while(dateActuelle <= fin){



let fleur =
document.createElement("div");



let dateFleur =
new Date(dateActuelle);


dateFleur.setHours(0,0,0,0);



let symbole="🌙";

let classe="";

let ouvrable=false;





if(dateFleur <= maintenant){


symbole="🪷";

classe="ouverte";

ouvrable=true;


}





if(dateFleur.getTime() === fin.getTime()){


symbole="🌹";

classe="finale";


if(dateFleur <= maintenant){

ouvrable=true;

}


}







fleur.className="fleur-jardin";



fleur.innerHTML=

`

<div class="sceau-fleur ${classe}">

${symbole}

</div>


<div class="date-fleur">

${afficherDate(dateFleur)}

</div>

`;








if(ouvrable){


fleur.onclick=function(){


window.location.href=

"lettre.html?date="

+

dateFleur.toISOString();



};


}






chemin.appendChild(fleur);



dateActuelle.setDate(

dateActuelle.getDate()+1

);


}









// SECRET DU 29 AOÛT


let secret =
new Date("2026-08-29");


secret.setHours(0,0,0,0);





if(maintenant.getTime() === secret.getTime()){



let message =
document.createElement("div");



message.className="souvenir";



message.innerHTML=

`

👑

<br><br>

Le jardin semble arrivé au bout du chemin...

<br><br>

Mais un dernier secret attend demain.

`;



document.querySelector(".jardin")

.appendChild(message);


}









// PLUIE D'ÉTOILES


function creerEtoile(){


const etoiles=[

"✨",

"⭐",

"💛",

"❤️"

];



const p=document.createElement("div");


p.className="petale";


p.innerHTML=

etoiles[

Math.floor(

Math.random()*etoiles.length

)

];



p.style.left=

Math.random()*100+"vw";



p.style.fontSize=

(14+Math.random()*22)+"px";



p.style.animationDuration=

(6+Math.random()*6)+"s";



document.body.appendChild(p);



setTimeout(()=>{

p.remove();

},12000);



}



setInterval(creerEtoile,350);



</script>


</body>

</html>
