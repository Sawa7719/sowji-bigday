<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le jardin</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="porte-jardin">

<div class="cadre-porte">

<h2>
🌹 Le jardin du palais
</h2>

</div>

</div>



<div class="jardin">


<h1>
🌿 Ton jardin
</h1>


<p class="phrase">
Chaque jour une fleur s'ouvre jusqu'au plus beau des jours.
<br><br>
<span id="compteur"></span>
</p>



<div class="chemin" id="chemin"></div>



</div>




<script>


const chemin =
document.getElementById("chemin");



const debut =
new Date("2026-07-21");

const fin =
new Date("2026-08-30");



const maintenant =
new Date();

maintenant.setHours(0,0,0,0);



const grandJour =
new Date("2026-08-30");

grandJour.setHours(0,0,0,0);



let reste =
Math.ceil(
(grandJour-maintenant)
/(1000*60*60*24)
);



document.getElementById("compteur").innerHTML =

reste > 0 ?

"Encore "+reste+" jours avant le grand jour 🌹"

:

"Le grand jour est arrivé 🌹";





function afficherDate(date){

return date.toLocaleDateString(
"fr-FR",
{
day:"numeric",
month:"long"
}
);

}





let dateActuelle =
new Date(debut);



while(dateActuelle <= fin){



let fleur =
document.createElement("div");



let dateFleur =
new Date(dateActuelle);

dateFleur.setHours(0,0,0,0);



let symbole = "🔒";

let classe = "";

let ouvrable = false;



// Fleur disponible seulement si la date est arrivée

if(dateFleur <= maintenant){


symbole="🌸";

classe="ouverte";

ouvrable=true;


}



// Dernière fleur

if(

dateFleur.getTime()
===

fin.getTime()

){


symbole="🌹";

classe="finale";


if(dateFleur <= maintenant){

ouvrable=true;

}

}





fleur.className =
"fleur-jardin";



fleur.innerHTML =

`

<div class="sceau-fleur ${classe}">

${symbole}

</div>

<div class="date-fleur">

${afficherDate(dateFleur)}

</div>

`;





if(ouvrable){


fleur.onclick=function(){


if(dateFleur.getTime()===fin.getTime()){


window.location.href="grandjour.html";


}

else{


window.location.href=

"lettre.html?date="+dateFleur.toISOString();


}


};


}





chemin.appendChild(fleur);



dateActuelle.setDate(

dateActuelle.getDate()+1

);


}



</script>


</body>

</html>
