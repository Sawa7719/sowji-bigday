<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ton jardin</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="porte-jardin">

<div class="cadre-porte">

<h2>
Pour t’accompagner<br>
jusqu’au plus beau des jours…
</h2>

</div>

</div>



<div class="jardin">


<h1>
🌿 Ton jardin
</h1>


<p class="phrase">

Un voyage écrit avec le cœur,<br>
jusqu'au plus beau des jours.

<br><br>

<span id="compteur"></span>

</p>



<div class="chemin" id="chemin"></div>



</div>




<script>


const chemin =
document.getElementById("chemin");


const debut =
new Date("2026-07-21");


const fin =
new Date("2026-08-30");


const aujourdHui =
new Date();



const grandJour =
new Date("2026-08-30");



let difference =
grandJour - aujourdHui;


let jours =
Math.max(
0,
Math.ceil(
difference / (1000*60*60*24)
)
);



document.getElementById("compteur").innerHTML =

"Encore " + jours + " jours avant le plus beau des jours…";





function afficherDate(date){

return date.toLocaleDateString(
"fr-FR",
{
day:"numeric",
month:"long"
}
);

}





let dateActuelle =
new Date(debut);



while(dateActuelle <= fin){


let cleDate =
dateActuelle.toISOString().split("T")[0];



let fleur =
document.createElement("div");



let classe =
"lune";


let symbole =
"🌙";


let ouvrable =
false;



// DERNIERE FLEUR

if(cleDate === "2026-08-30"){


symbole="🌹";

classe="finale";

ouvrable=true;


}


// LETTRES EXISTANTES

else if(

localStorage.getItem(
"sowji-"+cleDate
)

){


symbole="🪷";

classe="lotus";

ouvrable=true;


}


// JOUR ACTUEL

else if(

cleDate === aujourdHui.toISOString().split("T")[0]

){


symbole="💎";

classe="bijou";

ouvrable=true;


}




fleur.className =
"fleur-jardin";



fleur.innerHTML =

`

<div class="sceau-fleur ${classe}">

${symbole}

</div>

<div class="date-fleur">

${afficherDate(dateActuelle)}

</div>

`;




if(ouvrable){


fleur.onclick=function(){


if(cleDate==="2026-08-30"){


window.location.href="grandjour.html";


}

else{


window.location.href=

"lettre.html?date="+dateActuelle.toISOString();


}


};


}



chemin.appendChild(fleur);



dateActuelle.setDate(
dateActuelle.getDate()+1
);


}



</script>


</body>

</html>
