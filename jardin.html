<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ton jardin</title>


<style>

body {

margin:0;
min-height:100vh;

background:
radial-gradient(circle at top, #183b2a, #050907);

font-family:Georgia, serif;

color:#f5e6b8;

text-align:center;

overflow-x:hidden;

}


.jardin {

padding:40px 20px;

}



h1 {

font-size:42px;

color:#d4af37;

text-shadow:0 0 15px rgba(212,175,55,0.5);

}



.intro {

font-size:20px;

line-height:1.6;

max-width:420px;

margin:20px auto 50px;

}



.chemin {

display:flex;

flex-wrap:wrap;

justify-content:center;

gap:35px;

max-width:600px;

margin:auto;

}



.fleur {

width:110px;

height:110px;

border-radius:50%;

background:#f4ead3;

border:3px solid #d4af37;

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

font-size:38px;

color:#333;

box-shadow:

0 0 20px rgba(212,175,55,0.4);

transition:0.5s;

animation:pousser 1s ease;

}



.fleur:hover {

transform:translateY(-8px) scale(1.05);

box-shadow:

0 0 35px rgba(212,175,55,0.8);

}



.fleur small {

font-size:13px;

margin-top:5px;

color:#555;

}



@keyframes pousser {

from {

opacity:0;

transform:scale(0);

}

to {

opacity:1;

transform:scale(1);

}

}


</style>

</head>



<body>


<div class="jardin">


<h1>
🌿 Ton jardin 🌿
</h1>


<p class="intro">

Un chemin de lettres t’attend.

Certaines fleurs dorment encore,
certaines ont déjà livré leur secret.

</p>

Chaque jour, une nouvelle fleur s’ouvre
sur le chemin vers ton grand jour.

</p>



<div class="chemin" id="chemin">

</div>



</div>




<script>


let chemin =
document.getElementById("chemin");



let debut =
new Date("July 21, 2026");

let fin =
new Date("August 30, 2026");



// DATE DE TEST
// On changera ça plus tard
// pour la vraie date automatique

let aujourdHui =
new Date("July 21, 2026");





function afficherDate(date){

return date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long",

year:"numeric"

}

);

}





let dateActuelle =
new Date(debut);





while(dateActuelle <= fin){



let fleur =
document.createElement("div");


fleur.className="fleur";



let symbole;



if(dateActuelle < aujourdHui){

symbole="🪷";

}

else if(

dateActuelle.getTime()

===

aujourdHui.getTime()

){

symbole="💎";

}

else{

symbole="🌙";

}




fleur.innerHTML =

`

${symbole}

<small>

${afficherDate(dateActuelle)}

</small>

`;





chemin.appendChild(fleur);





dateActuelle.setDate(

dateActuelle.getDate()+1

);



}




</script>


</body>

</html>
