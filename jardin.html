<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ton jardin</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="porte-jardin">

    <div class="cadre-porte">

        <h2>
        Pour t’accompagner<br>
        jusqu’au plus beau des jours…
        </h2>

    </div>

</div>



<div class="jardin">


<h1>
🌿 Ton jardin
</h1>


<p class="phrase">

Un voyage écrit avec le cœur,<br>
jusqu'au plus beau des jours.

</p>



<div class="chemin" id="chemin">

</div>



</div>



<script>


const chemin = document.getElementById("chemin");



const debut = new Date("2026-07-21");

const fin = new Date("2026-08-30");



// Date de test
// À modifier plus tard

const aujourdHui = new Date("2026-07-21");





function afficherDate(date){


return date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long"

}

);


}




let dateActuelle = new Date(debut);

let compteur = 0;




while(dateActuelle <= fin){



let fleur = document.createElement("div");



fleur.className =

"fleur-jardin fleur-" + compteur;




let symbole;

let classeSceau;

let ouverte = false;



let lettreSauvegardee =

localStorage.getItem(

"sowji-" +

dateActuelle.toISOString().split("T")[0]

);





if(lettreSauvegardee){


symbole = "🪷";

classeSceau = "lotus";

ouverte = true;


}



else if(dateActuelle < aujourdHui){


symbole = "🪷";

classeSceau = "lotus";

ouverte = true;


}



else if(

dateActuelle.getTime()

===

aujourdHui.getTime()

){


symbole = "💎";

classeSceau = "bijou";

ouverte = true;


}



else{


symbole = "🌙";

classeSceau = "lune";


}





fleur.innerHTML =

`

<div class="sceau-fleur ${classeSceau}">

${symbole}

</div>


<div class="date-fleur">

${afficherDate(dateActuelle)}

</div>

`;





if(ouverte){



let dateLettre =

dateActuelle.toISOString();



fleur.onclick = function(){


window.location.href =

"lettre.html?date=" + dateLettre;


};



}



else{



fleur.onclick = function(){


alert(

"Cette lettre poursuit encore son voyage..."

);


};



}





fleur.style.setProperty(

"--position",

compteur

);



chemin.appendChild(fleur);



dateActuelle.setDate(

dateActuelle.getDate()+1

);



compteur++;



}





function ouvrirAtelier(){


window.location.href =

"ecrire.html";


}



</script>



</body>

</html>
