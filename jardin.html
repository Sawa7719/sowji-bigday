<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Le jardin royal</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="jardin">


<h1>
✨Le Jardin de Sowji✨
</h1>


<p class="phrase">

Chaque fleur cache une lettre.

<br><br>

Chaque jour, le jardin révèle un nouveau souvenir.

<br><br>

<span id="compteur"></span>

</p>



<div class="chemin" id="chemin"></div>


</div>




<script src="lettres.js"></script>



<script>


const chemin =
document.getElementById("chemin");



const debut =
new Date("2026-07-21");


const fin =
new Date("2026-08-30");



const maintenant =
new Date();

maintenant.setHours(0,0,0,0);



const grandJour =
new Date("2026-08-30");

grandJour.setHours(0,0,0,0);



let reste =
Math.ceil(
(grandJour-maintenant)
/(1000*60*60*24)
);



document.getElementById("compteur").innerHTML =

reste > 0 ?

"Encore "+reste+" jours avant le grand jour 🌹"

:

"Le grand jour est arrivé 👑";





function afficherDate(date){

return date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long"

}

);

}





let dateActuelle =
new Date(debut);





while(dateActuelle <= fin){



let fleur =
document.createElement("div");



let dateFleur =
new Date(dateActuelle);


dateFleur.setHours(0,0,0,0);



let symbole="🌙";

let classe="";

let ouvrable=false;





// fleurs ouvertes seulement si la date est arrivée

if(dateFleur <= maintenant){


symbole="🪷";

classe="ouverte";

ouvrable=true;


}





// dernière fleur

if(

dateFleur.getTime()

===

fin.getTime()

){


symbole="🌹";

classe="finale";


if(dateFleur <= maintenant){

ouvrable=true;

}


}





fleur.className="fleur-jardin";



fleur.innerHTML=

`

<div class="sceau-fleur ${classe}">

${symbole}

</div>


<div class="date-fleur">

${afficherDate(dateFleur)}

</div>

`;





if(ouvrable){


fleur.onclick=function(){



window.location.href=

"lettre.html?date="+

dateFleur.toISOString();



};


}




chemin.appendChild(fleur);



dateActuelle.setDate(

dateActuelle.getDate()+1

);


}







// MESSAGE SECRET DU 29 AOÛT


let aujourdHui =
new Date();


aujourdHui.setHours(0,0,0,0);



let secret =
new Date("2026-08-29");


secret.setHours(0,0,0,0);





if(aujourdHui.getTime() === secret.getTime()){



let message =
document.createElement("div");



message.className="souvenir";



message.innerHTML=

`

👑

<br><br>

Une porte du palais semble encore cachée...

<br><br>

Certains secrets attendent le bon moment pour apparaître.

`;



document.querySelector(".jardin")

.appendChild(message);



}







// PLUIE D'ÉTOILES MAGIQUES



function creerEtoile(){



const etoiles=[

"✨",

"⭐",

"❤️",

"💛"

];



const p=document.createElement("div");



p.className="petale";



p.innerHTML=

etoiles[

Math.floor(

Math.random()*etoiles.length

)

];



p.style.left=

Math.random()*100+"vw";



p.style.fontSize=

(14+Math.random()*22)+"px";



p.style.animationDuration=

(6+Math.random()*6)+"s";



document.body.appendChild(p);



setTimeout(function(){

p.remove();

},12000);



}



setInterval(creerEtoile,350);



</script>



</body>

</html>
