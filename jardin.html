<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ton jardin</title>


<style>

body {

margin:0;
min-height:100vh;

background:
linear-gradient(
to bottom,
#07110c,
#123524
);

font-family:Georgia, serif;

color:#f5e6b8;

text-align:center;

overflow-x:hidden;

}


.jardin {

padding:40px 20px;

}


h1 {

font-size:42px;

color:#d4af37;

margin-top:30px;

}


.intro {

font-size:20px;

line-height:1.6;

max-width:400px;

margin:auto;

}


.chemin {

margin-top:50px;

display:flex;

flex-direction:column;

gap:25px;

align-items:center;

}


.fleur {

width:120px;

height:120px;

border-radius:50%;

background:#f4ead3;

border:3px solid #d4af37;

display:flex;

justify-content:center;

align-items:center;

font-size:45px;

box-shadow:0 0 25px rgba(212,175,55,0.5);

}


</style>

</head>


<body>


<div class="jardin">


<h1>🌹Ton jardin🌹</h1>


<p class="intro">

Chaque jour, une nouvelle fleur s’ouvre
sur le chemin vers ton grand jour.

</p>



<div class="chemin" id="chemin">

</div>


</div>

<script>

let chemin = document.getElementById("chemin");


let debut = new Date("July 21, 2026");
let fin = new Date("August 30, 2026");


// Mode test pour vous
// Changez la date ici pour tester
let aujourdHui = new Date("July 21, 2026");



function afficherDate(date){

return date.toLocaleDateString(
"fr-FR",
{
day:"numeric",
month:"long"
}
);

}



let dateActuelle = new Date(debut);



while(dateActuelle <= fin){


let fleur = document.createElement("div");

fleur.className="fleur";


let symbole;


if(dateActuelle < aujourdHui){

symbole="🪷";

}

else if(
dateActuelle.getTime() === aujourdHui.getTime()
){

symbole="💎";

}

else{

symbole="🌙";

}



fleur.innerHTML = `

${symbole}

<br>

<small>
${afficherDate(dateActuelle)}
</small>

`;



chemin.appendChild(fleur);



dateActuelle.setDate(
dateActuelle.getDate()+1
);


}


</script>
</body>
</html>
