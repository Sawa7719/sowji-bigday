<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ton jardin</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="porte-jardin">

<div class="cadre-porte">

<h2>
Pour t’accompagner<br>
jusqu’au plus beau des jours…
</h2>

</div>

</div>



<div class="jardin">


<h1>
🌿 Ton jardin
</h1>


<p class="phrase">

Un voyage écrit avec le cœur,<br>
jusqu'au plus beau des jours.

</p>



<div class="chemin" id="chemin">

</div>



</div>




<script>


const chemin =

document.getElementById("chemin");



const debut =

new Date("2026-07-21");



const fin =

new Date("2026-08-30");



// Date de test
// À changer plus tard

const aujourdHui =

new Date("2026-07-21");





function afficherDate(date){


return date.toLocaleDateString(

"fr-FR",

{

day:"numeric",

month:"long"

}

);


}




let dateActuelle =

new Date(debut);





while(dateActuelle <= fin){



let fleur =

document.createElement("div");



fleur.className =

"fleur-jardin";





let symbole;



let ouverte = false;



if(dateActuelle < aujourdHui){


symbole = "✿";

ouverte = true;


}

else if(

dateActuelle.getTime()

===

aujourdHui.getTime()

){


symbole = "◇";

ouverte = true;


}

else{


symbole = "☾";


}





fleur.innerHTML =

`

<div class="sceau-fleur">

${symbole}

</div>


<div class="date-fleur">

${afficherDate(dateActuelle)}

</div>

`;





if(ouverte){


let dateLettre =

dateActuelle.toISOString();



fleur.onclick = function(){


window.location.href =

"lettre.html?date="

+

dateLettre;


};


}

else{


fleur.onclick = function(){


alert(

"Cette lettre voyage encore jusqu'à son jour..."

);


};


}





chemin.appendChild(fleur);





dateActuelle.setDate(

dateActuelle.getDate()+1

);



}



</script>



</body>

</html>
